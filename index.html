<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta digital | Laedson</title>

<style>

:root{
--bg:#efe8dc;
--bg-2:#e7ddcf;
--paper:#f5ebd8;
--paper-2:#efe2cb;
--wine:#7d1111;
--wine-soft:#9a1a1a;
--text:#6f1515;
--text-soft:#8b4a4a;
--paper-line:rgba(125,17,17,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
min-height:100vh;
font-family:Georgia,"Times New Roman",serif;
background:
radial-gradient(circle at 20% 20%, rgba(255,255,255,0.35), transparent 20%),
radial-gradient(circle at 80% 30%, rgba(255,255,255,0.25), transparent 18%),
linear-gradient(180deg,var(--bg),var(--bg-2));
color:var(--text);
overflow-x:hidden;
}

.stars{
position:fixed;
inset:0;
pointer-events:none;
}

.star{
position:absolute;
color:#7d1111;
opacity:.7;
}

.screen{
min-height:100vh;
display:grid;
place-items:center;
padding:40px 20px;
}

.intro{
text-align:center;
max-width:800px;
}

.mini{
display:inline-block;
padding:10px 16px;
border-radius:999px;
background:#fff4ef;
border:1px solid rgba(125,17,17,.1);
font-size:14px;
color:var(--wine);
}

h1{
margin-top:20px;
font-size:clamp(40px,8vw,70px);
color:var(--wine);
}

h1 .accent{
display:block;
font-style:italic;
color:var(--wine-soft);
}

.intro p{
margin-top:20px;
font-size:20px;
line-height:1.8;
color:var(--text-soft);
}

.open-card{
margin-top:40px;
padding:30px;
background:linear-gradient(var(--paper),var(--paper-2));
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.1);
}

.seal-visual{
width:80px;
height:80px;
border-radius:50%;
margin:auto;
display:grid;
place-items:center;
font-size:28px;
color:white;
background:linear-gradient(#7d1111,#9a1a1a);
}

.open-card-title{
font-size:26px;
margin-top:15px;
color:var(--wine);
}

.open-card-text{
margin-top:10px;
color:var(--text-soft);
}

.open-btn{
margin-top:20px;
padding:14px 26px;
border-radius:999px;
border:none;
cursor:pointer;
font-weight:bold;
background:linear-gradient(#9a1a1a,#7d1111);
color:white;
}

.letter-stage{
display:none;
padding:40px 20px 100px;
}

.letter-stage.show{
display:block;
}

.letter{
max-width:800px;
margin:auto;
background:linear-gradient(var(--paper),var(--paper-2));
padding:40px 30px;
border-radius:10px;
position:relative;
}

.letter::before{
content:"";
position:absolute;
inset:0;
background:
repeating-linear-gradient(
to bottom,
transparent 0,
transparent 34px,
var(--paper-line) 35px
);
pointer-events:none;
}

.letter::after{
content:"";
position:absolute;
left:40px;
top:0;
height:100%;
width:2px;
background:rgba(125,17,17,.15);
}

.letter-content{
padding-left:30px;
}

.line{
margin-bottom:25px;
}

.line.greeting{
font-size:36px;
color:var(--wine);
font-style:italic;
}

.line.paragraph{
font-size:24px;
line-height:1.9;
}

.line.highlight{
background:rgba(125,17,17,.05);
padding:18px;
border-radius:14px;
}

.signature{
font-size:50px;
font-family:cursive;
color:var(--wine);
}

.cursor{
animation:blink .8s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1}
25%,75%{opacity:0}
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<section class="screen" id="introSection">

<div class="intro">

<div class="mini">Uma carta digital escrita por Laedson</div>

<h1>
Para <span id="nomePessoaHero">você</span>,
<span class="accent">com carinho</span>
</h1>

<p>
Em vez de mandar apenas uma mensagem comum,
eu resolvi transformar esse carinho em uma pequena carta digital.
</p>

<div class="open-card">

<div class="seal-visual">♥</div>

<div class="open-card-title">
Uma dedicatória especial
</div>

<div class="open-card-text">
Escrevi esta carta pensando em você.
Quando quiser, abra e leia com calma.
</div>

<button class="open-btn" id="openButton">
ABRIR CARTA
</button>

</div>

</div>

</section>

<section class="letter-stage" id="letterStage">

<div class="letter">

<div class="letter-content">

<div class="line greeting">
<span class="type-target" data-text="Feliz Dia das Mulheres, você." id="line1"></span>
</div>

<div class="line paragraph">
<span class="type-target" data-text="Hoje eu não queria escrever apenas mais uma frase bonita. Eu queria fazer algo que tivesse mais de mim, mais intenção, mais cuidado e mais verdade." id="line2"></span>
</div>

<div class="line paragraph">
<span class="type-target" data-text="Por isso resolvi criar esta página, como se fosse uma carta. Um espaço simples, mas feito com carinho, para que cada palavra fosse lida com calma." id="line3"></span>
</div>

<div class="line paragraph">
<span class="type-target" data-text="Existem momentos em que uma mensagem comum não parece suficiente, e este é um deles. Este dia merece mais do que apenas algumas palavras rápidas." id="line4"></span>
</div>

<div class="line paragraph highlight">
<span class="type-target" data-text="Quero que você se lembre da força que existe em você, da beleza que vai muito além da aparência e da luz que a sua presença espalha ao seu redor." id="line5"></span>
</div>

<div class="line paragraph">
<span class="type-target" data-text="Existem mulheres que inspiram pelo que dizem, pelo que fazem e pela maneira como seguem em frente mesmo quando as coisas não são fáceis." id="line6"></span>
</div>

<div class="line paragraph">
<span class="type-target" data-text="Mulheres que carregam sonhos, responsabilidades, histórias e ainda assim encontram espaço para espalhar gentileza e cuidado." id="line7"></span>
</div>

<div class="line paragraph">
<span class="type-target" data-text="Hoje é um dia para reconhecer essa força, essa sensibilidade e essa capacidade incrível de transformar o mundo ao redor." id="line8"></span>
</div>

<div class="line paragraph soft">
<span class="type-target" data-text="Por isso eu quis parar um instante, organizar meus pensamentos e escrever algo que fosse mais do que uma simples frase." id="line9"></span>
</div>

<div class="line paragraph">
<span class="type-target" data-text="Que nunca lhe faltem reconhecimento, paz, amor, oportunidades, felicidade e motivos sinceros para sorrir." id="line10"></span>
</div>

<div class="line paragraph">
<span class="type-target" data-text="Que seus sonhos encontrem caminhos, que seus esforços sejam valorizados e que você continue sendo exatamente quem você é." id="line11"></span>
</div>

<div class="line paragraph">
<span class="type-target" data-text="Porque pessoas especiais deixam marcas positivas na vida de quem está por perto." id="line12"></span>
</div>

<div class="line paragraph">
<span class="type-target" data-text="Que estas palavras levem até você um pouco do respeito, da admiração e do carinho que este dia representa." id="line13"></span>
</div>

<div class="line signature-block">

<div class="closing">
<span class="type-target" data-text="Com carinho," id="line14"></span>
</div>

<div class="signature">
<span class="type-target" data-text="Laedson" id="line15"></span>
</div>

</div>

</div>

</section>

<script>

const stars=document.getElementById("stars");

for(let i=0;i<25;i++){
const star=document.createElement("span");
star.className="star";
star.textContent="★";
star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";
star.style.fontSize=(12+Math.random()*18)+"px";
stars.appendChild(star);
}

function capitalizarNome(texto){
return texto
.split(" ")
.map(p=>p.charAt(0).toUpperCase()+p.slice(1).toLowerCase())
.join(" ");
}

function aplicarNome(){

const params=new URLSearchParams(window.location.search);
const nome=params.get("nome");

if(!nome)return "você";

const nomeFormatado=capitalizarNome(nome);

document.getElementById("nomePessoaHero").textContent=nomeFormatado;

return nomeFormatado;
}

const nomePessoa=aplicarNome();

function substituirNome(){

const linha1=document.getElementById("line1");
let texto=linha1.getAttribute("data-text");

texto=texto.replace("você",nomePessoa);

linha1.setAttribute("data-text",texto);

}

substituirNome();

function wait(ms){
return new Promise(r=>setTimeout(r,ms));
}

async function digitar(el,texto,vel=25){

return new Promise(resolve=>{

let i=0;

const timer=setInterval(()=>{

i++;

el.innerHTML=texto.slice(0,i)+'<span class="cursor">|</span>';

if(i>=texto.length){

clearInterval(timer);

setTimeout(()=>{
el.textContent=texto;
resolve();
},200);

}

},vel);

});

}

async function iniciarDigitacao(){

const linhas=[...document.querySelectorAll(".type-target")];

for(const linha of linhas){

const texto=linha.getAttribute("data-text");

await digitar(linha,texto);

await wait(300);

}

}

let aberta=false;

async function abrirCarta(){

if(aberta)return;
aberta=true;

document.getElementById("introSection").style.display="none";

const stage=document.getElementById("letterStage");

stage.classList.add("show");

window.scrollTo({top:0});

await wait(300);

iniciarDigitacao();

}

document.getElementById("openButton").addEventListener("click",abrirCarta);

</script>

</body>
</html>
